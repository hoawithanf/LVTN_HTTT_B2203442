<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315b8e" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c8b5f" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8090a3" flood-opacity="0.18" />
    </filter>
  </defs>

  <style>
    .title {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 30px;
      font-weight: 700;
      fill: #1e252d;
    }
    .layer-label {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #1f2730;
    }
    .card-title {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 18px;
      font-weight: 700;
      fill: #ffffff;
    }
    .text {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 15px;
      fill: #39424c;
    }
    .flow-label {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 14px;
      font-style: italic;
      fill: #3f5976;
    }
    .flow-label-green {
      font-family: Arial, Tahoma, "DejaVu Sans", sans-serif;
      font-size: 14px;
      font-style: italic;
      fill: #2f7f59;
    }
    .layer-1 {
      fill: #dcebfb;
      stroke: #3b78c3;
      stroke-width: 2.2;
    }
    .layer-2 {
      fill: #dbf3e7;
      stroke: #2f9b68;
      stroke-width: 2.2;
    }
    .layer-3 {
      fill: #e7f5d8;
      stroke: #6ea63e;
      stroke-width: 2.2;
    }
    .card {
      fill: #ffffff;
      stroke-width: 1.7;
      filter: url(#shadow);
    }
    .blue-card { stroke: #4a81c7; }
    .green-card { stroke: #2f9b68; }
    .olive-card { stroke: #6a8f34; }
    .dark-head { fill: #74736a; }
    .blue-head { fill: #2f67ab; }
    .green-head { fill: #1f8b56; }
    .orange-head { fill: #c57b00; }
    .flow-blue {
      fill: none;
      stroke: #3b78c3;
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }
    .flow-green {
      fill: none;
      stroke: #2f9b68;
      stroke-width: 2.2;
      marker-end: url(#arrow-green);
    }
  </style>

  <rect x="0" y="0" width="1800" height="1080" fill="#ffffff" />
  <text class="title" x="900" y="45" text-anchor="middle">Mô hình kiến trúc 3 lớp của hệ thống Musicalisation hiện tại</text>

  <g>
    <rect class="layer-1" x="12" y="70" width="1776" height="300" rx="18" ry="18" />
    <text class="layer-label" x="900" y="104" text-anchor="middle">Lớp 1: Giao diện (Presentation Layer)</text>

    <g transform="translate(40,112)">
      <rect class="card blue-card" x="0" y="0" width="360" height="225" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="0" width="360" height="50" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="40" width="360" height="10" />
      <text class="card-title" x="180" y="34" text-anchor="middle">Trình duyệt</text>
      <text class="text" x="180" y="82" text-anchor="middle">Chrome / Edge / Safari</text>
      <text class="text" x="180" y="118" text-anchor="middle">Người dùng &amp; quản trị viên</text>
      <text class="text" x="180" y="154" text-anchor="middle">Gửi HTTP request</text>
      <text class="text" x="180" y="190" text-anchor="middle">Nhận HTML / JSON</text>
    </g>

    <g transform="translate(440,112)">
      <rect class="card blue-card" x="0" y="0" width="360" height="225" rx="12" ry="12" />
      <rect class="blue-head" x="0" y="0" width="360" height="50" rx="12" ry="12" />
      <rect class="blue-head" x="0" y="40" width="360" height="10" />
      <text class="card-title" x="180" y="34" text-anchor="middle">PHP Views</text>
      <text class="text" x="180" y="82" text-anchor="middle">index.php, post.php, profile.php</text>
      <text class="text" x="180" y="118" text-anchor="middle">search.php, news.php, admin/*.php</text>
      <text class="text" x="180" y="154" text-anchor="middle">Render giao diện động</text>
      <text class="text" x="180" y="190" text-anchor="middle">Form, session, điều hướng</text>
    </g>

    <g transform="translate(840,112)">
      <rect class="card blue-card" x="0" y="0" width="360" height="225" rx="12" ry="12" />
      <rect class="blue-head" x="0" y="0" width="360" height="50" rx="12" ry="12" />
      <rect class="blue-head" x="0" y="40" width="360" height="10" />
      <text class="card-title" x="180" y="34" text-anchor="middle">Static Assets</text>
      <text class="text" x="180" y="82" text-anchor="middle">HTML shell, CSS, JavaScript</text>
      <text class="text" x="180" y="118" text-anchor="middle">Ảnh, icon, giao diện tương tác</text>
      <text class="text" x="180" y="154" text-anchor="middle">public/assets + vendor</text>
      <text class="text" x="180" y="190" text-anchor="middle">Tải từ public/assets</text>
    </g>

    <g transform="translate(1240,112)">
      <rect class="card blue-card" x="0" y="0" width="520" height="225" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="0" width="520" height="50" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="40" width="520" height="10" />
      <text class="card-title" x="260" y="34" text-anchor="middle">XAMPP Web Server</text>
      <text class="text" x="260" y="82" text-anchor="middle">Apache + PHP</text>
      <text class="text" x="260" y="118" text-anchor="middle">Chạy local trên XAMPP</text>
      <text class="text" x="260" y="154" text-anchor="middle">Nhận request từ browser</text>
      <text class="text" x="260" y="190" text-anchor="middle">Phục vụ PHP pages / assets</text>
    </g>

    <path class="flow-blue" d="M 400 223 H 440" />
    <text class="flow-label" x="420" y="213" text-anchor="middle">HTTP Req / Res</text>
    <path class="flow-blue" d="M 800 223 H 840" />
    <text class="flow-label" x="820" y="213" text-anchor="middle">render</text>
    <path class="flow-blue" d="M 1200 223 H 1240" />
    <text class="flow-label" x="1220" y="213" text-anchor="middle">serve</text>
  </g>

  <path class="flow-blue" d="M 900 370 V 400" />
  <path class="flow-blue" d="M 930 400 V 370" />
  <text class="flow-label" x="960" y="392">HTTP Request / Response</text>

  <g>
    <rect class="layer-2" x="12" y="400" width="1776" height="330" rx="18" ry="18" />
    <text class="layer-label" x="900" y="436" text-anchor="middle">Lớp 2: Nghiệp vụ (Business / Service Layer)</text>

    <g transform="translate(40,455)">
      <rect class="card green-card" x="0" y="0" width="340" height="160" rx="12" ry="12" />
      <rect class="green-head" x="0" y="0" width="340" height="48" rx="12" ry="12" />
      <rect class="green-head" x="0" y="36" width="340" height="12" />
      <text class="card-title" x="170" y="32" text-anchor="middle">PHP Logic</text>
      <text class="text" x="170" y="80" text-anchor="middle">Routing &amp; điều hướng</text>
      <text class="text" x="170" y="114" text-anchor="middle">Validation form / request</text>
      <text class="text" x="170" y="148" text-anchor="middle">Helper nghiệp vụ</text>
    </g>

    <g transform="translate(430,455)">
      <rect class="card green-card" x="0" y="0" width="390" height="160" rx="12" ry="12" />
      <rect class="orange-head" x="0" y="0" width="390" height="48" rx="12" ry="12" />
      <rect class="orange-head" x="0" y="36" width="390" height="12" />
      <text class="card-title" x="195" y="32" text-anchor="middle">AI &amp; External APIs</text>
      <text class="text" x="195" y="80" text-anchor="middle">OpenAI API</text>
      <text class="text" x="195" y="114" text-anchor="middle">YouTube Data API</text>
      <text class="text" x="195" y="148" text-anchor="middle">Lyrics / media fetch</text>
    </g>

    <g transform="translate(860,455)">
      <rect class="card green-card" x="0" y="0" width="390" height="160" rx="12" ry="12" />
      <rect class="orange-head" x="0" y="0" width="390" height="48" rx="12" ry="12" />
      <rect class="orange-head" x="0" y="36" width="390" height="12" />
      <text class="card-title" x="195" y="32" text-anchor="middle">Features / APIs</text>
      <text class="text" x="195" y="80" text-anchor="middle">Search suggest, comments, follow</text>
      <text class="text" x="195" y="114" text-anchor="middle">Playlist, notifications, rating</text>
      <text class="text" x="195" y="148" text-anchor="middle">Recap, persona, recommendations</text>
    </g>

    <g transform="translate(1290,455)">
      <rect class="card green-card" x="0" y="0" width="470" height="160" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="0" width="470" height="48" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="36" width="470" height="12" />
      <text class="card-title" x="235" y="32" text-anchor="middle">.env Configuration</text>
      <text class="text" x="235" y="80" text-anchor="middle">DB_HOST / DB_DATABASE / DB_USERNAME</text>
      <text class="text" x="235" y="114" text-anchor="middle">OPENAI_API_KEY / OPENAI_MODEL</text>
      <text class="text" x="235" y="148" text-anchor="middle">YOUTUBE_API_KEY</text>
    </g>

    <g transform="translate(40,632)">
      <rect class="card green-card" x="0" y="0" width="560" height="92" rx="12" ry="12" />
      <rect class="green-head" x="0" y="0" width="560" height="42" rx="12" ry="12" />
      <rect class="green-head" x="0" y="30" width="560" height="12" />
      <text class="card-title" x="280" y="29" text-anchor="middle">Database Connector</text>
      <text class="text" x="280" y="66" text-anchor="middle">config/database.php + public/includes/database.php</text>
      <text class="text" x="280" y="88" text-anchor="middle">mysqli + utf8mb4</text>
    </g>

    <g transform="translate(650,632)">
      <rect class="card green-card" x="0" y="0" width="500" height="92" rx="12" ry="12" />
      <rect class="green-head" x="0" y="0" width="500" height="42" rx="12" ry="12" />
      <rect class="green-head" x="0" y="30" width="500" height="12" />
      <text class="card-title" x="250" y="29" text-anchor="middle">Session &amp; Auth Manager</text>
      <text class="text" x="250" y="66" text-anchor="middle">session_start(), login guard, admin guard</text>
      <text class="text" x="250" y="88" text-anchor="middle">Cookie / session / role check</text>
    </g>

    <g transform="translate(1200,632)">
      <rect class="card green-card" x="0" y="0" width="560" height="92" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="0" width="560" height="42" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="30" width="560" height="12" />
      <text class="card-title" x="280" y="29" text-anchor="middle">XAMPP MySQL Service</text>
      <text class="text" x="280" y="66" text-anchor="middle">MySQL / MariaDB local</text>
      <text class="text" x="280" y="88" text-anchor="middle">Kết nối localhost:3306</text>
    </g>

    <path class="flow-green" d="M 380 535 H 430" />
    <text class="flow-label-green" x="405" y="525" text-anchor="middle">gọi API</text>
    <path class="flow-green" d="M 820 535 H 860" />
    <text class="flow-label-green" x="840" y="525" text-anchor="middle">media</text>
    <path class="flow-green" d="M 600 678 H 650" />
    <text class="flow-label-green" x="625" y="666" text-anchor="middle">auth</text>
  </g>

  <path class="flow-green" d="M 900 730 V 760" />
  <path class="flow-green" d="M 930 760 V 730" />
  <text class="flow-label-green" x="980" y="752">SQL Query / Result</text>

  <g>
    <rect class="layer-3" x="12" y="760" width="1776" height="290" rx="18" ry="18" />
    <text class="layer-label" x="900" y="796" text-anchor="middle">Lớp 3: Dữ liệu (Data Access Layer)</text>

    <g transform="translate(40,815)">
      <rect class="card olive-card" x="0" y="0" width="520" height="205" rx="12" ry="12" />
      <rect class="green-head" x="0" y="0" width="520" height="48" rx="12" ry="12" />
      <rect class="green-head" x="0" y="36" width="520" height="12" />
      <text class="card-title" x="260" y="32" text-anchor="middle">MySQL 8.0</text>
      <text class="text" x="260" y="80" text-anchor="middle">Database: nln_lyrics</text>
      <text class="text" x="260" y="116" text-anchor="middle">utf8mb4 + SQL init scripts</text>
      <text class="text" x="260" y="152" text-anchor="middle">Lưu dữ liệu nghiệp vụ chính</text>
      <text class="text" x="260" y="188" text-anchor="middle">Truy cập qua MySQL / MariaDB local</text>
    </g>

    <g transform="translate(610,815)">
      <rect class="card olive-card" x="0" y="0" width="520" height="205" rx="12" ry="12" />
      <rect class="green-head" x="0" y="0" width="520" height="48" rx="12" ry="12" />
      <rect class="green-head" x="0" y="36" width="520" height="12" />
      <text class="card-title" x="260" y="32" text-anchor="middle">Core Tables</text>
      <text class="text" x="260" y="80" text-anchor="middle">users, songs, artists, albums</text>
      <text class="text" x="260" y="116" text-anchor="middle">genres, news</text>
      <text class="text" x="260" y="152" text-anchor="middle">lyrics, meaning, metadata</text>
      <text class="text" x="260" y="188" text-anchor="middle">Nội dung âm nhạc của hệ thống</text>
    </g>

    <g transform="translate(1180,815)">
      <rect class="card olive-card" x="0" y="0" width="580" height="205" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="0" width="580" height="48" rx="12" ry="12" />
      <rect class="dark-head" x="0" y="36" width="580" height="12" />
      <text class="card-title" x="290" y="32" text-anchor="middle">Interaction &amp; Storage</text>
      <text class="text" x="290" y="80" text-anchor="middle">comments, artist_follows, notifications</text>
      <text class="text" x="290" y="116" text-anchor="middle">search_logs, user_recommendations</text>
      <text class="text" x="290" y="152" text-anchor="middle">public/assets + uploads local</text>
      <text class="text" x="290" y="188" text-anchor="middle">Phục vụ media và dữ liệu phân tích</text>
    </g>
  </g>
</svg>
