<svg width="900" height="1300" viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><rect x="0" y="0" width="900" height="1300" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="32" text-anchor="middle" x="450" y="60">Quy trình theo dõi nghệ sĩ và nhận thông báo</text><g transform="translate(40 100)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Người dùng đăng nhập</tspan> <tspan x="410" dy="30">vào hệ thống</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 235)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 290)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Người dùng truy cập</tspan> <tspan x="410" dy="30">trang thông tin nghệ sĩ</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 425)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 480)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Người dùng chọn chức năng</tspan> <tspan x="410" dy="30">theo dõi nghệ sĩ</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 615)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 670)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Hệ thống lưu thông tin theo dõi</tspan> <tspan x="410" dy="30">vào cơ sở dữ liệu</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 805)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 860)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Khi có tin tức mới, hệ thống</tspan> <tspan x="410" dy="30">tạo thông báo cho người dùng</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 995)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 1050)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Người dùng truy cập mục thông báo</tspan> <tspan x="410" dy="30">để xem nội dung mới</tspan></text></g></svg>