<svg width="900" height="1500" viewBox="0 0 900 1500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><rect x="0" y="0" width="900" height="1500" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="32" text-anchor="middle" x="450" y="60">Quy trình quản trị hệ thống</text><g transform="translate(40 100)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Quản trị viên đăng nhập</tspan> <tspan x="410" dy="30">vào hệ thống quản trị</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 235)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 290)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Lựa chọn chức năng cần quản lý:</tspan> <tspan x="410" dy="30">người dùng, nghệ sĩ, bài hát, tin tức</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 425)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 480)"><rect x="0" y="0" rx="22" ry="22" width="820" height="180" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="45"><tspan x="410" dy="0">Thực hiện thao tác quản lý dữ liệu:</tspan> <tspan x="410" dy="30">thêm mới</tspan> <tspan x="410" dy="30">chỉnh sửa</tspan> <tspan x="410" dy="30">xóa dữ liệu</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 675)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 730)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Hệ thống cập nhật dữ liệu</tspan> <tspan x="410" dy="30">vào cơ sở dữ liệu</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 865)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 920)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Quản trị viên xem thống kê tổng quan</tspan> <tspan x="410" dy="30">trên dashboard</tspan></text></g><g stroke="#C7D8FF" stroke-width="8" stroke-linecap="round" fill="#C7D8FF" transform="translate(450 1055)"><line x1="0" y1="0" x2="0" y2="28"/><path d="M-10 28 10 28 0 42Z"/></g><g transform="translate(40 1110)"><rect x="0" y="0" rx="22" ry="22" width="820" height="120" stroke="#111111" stroke-width="5" fill="#FFFFFF"/><text fill="#1F1F1F" font-family="Times New Roman,Liberation Serif,DejaVu Serif,Times New Roman" font-weight="700" font-size="20" text-anchor="middle" x="410" y="50"><tspan x="410" dy="0">Khi cần, quản trị viên xuất báo cáo</tspan> <tspan x="410" dy="30">dưới dạng CSV hoặc PDF</tspan></text></g></svg>